version: '3.9'

services:
  # 1. 앱 서비스 (내 소스 코드가 돌아갈 가상 컴퓨터)
  app:
    build:
      context: .. # 한 단계 상위 폴더(프로젝트 전체)를 기준으로 빌드
      dockerfile: .devcontainer/Dockerfile
    container_name: boookntalk-app
    volumes:
      - ..:/workspaces/boookntalk # 내 소스 코드를 컨테이너 안으로 연결
    env_file:
      - ../.env # 최상위에 있는 .env 파일을 읽어옴
    depends_on:
      - postgres

  # 2. 데이터베이스 서비스
  postgres:
    image: postgres:16
    container_name: boookntalk-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: espoir
      POSTGRES_PASSWORD: espoir123sec
      POSTGRES_DB: boookntalk
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: